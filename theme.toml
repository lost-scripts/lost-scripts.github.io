# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = 'Lost'
license = 'MIT'
licenselink = 'https://github.com/lost-scripts/hugo-lost-theme/blob/master/LICENSE'
description = 'Item-style Hugo theme designed for... scripters?'
min_version = "0.142.0"

# The home page of the theme, where the source can be found
homepage = 'https://github.com/lost-scripts/hugo-lost-theme'

# If you have a running demo of the theme
demosite = 'https://lost-scripts.github.io/hugo-lost-theme'

# Taxonomy terms
tags = ['items', 'scripts', 'documentation', 'responsive', 'light', 'dark', 'company']
features = ['widgets', 'darkmode', 'dual navigator']

# If the theme has a single author
[author]
  name = 'Rai López'
  homepage = 'https://lost-scripts.github.io'

# If the theme has multiple authors
#authors = [
#  {name = 'Name of author', homepage = 'Website of author'},
#  {name = 'Name of author', homepage = 'Website of author'}
#]

# If porting an existing theme
#[original]
#  author = 'Name of original author'
#  homepage = 'Website of original author'
#  repo = 'https://github.com/owner/repo'
