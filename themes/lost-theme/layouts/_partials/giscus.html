{{- /* https://giscus.app/ */ -}}

{{- if (eq (.Site.Params.comments | default true) true) -}}
	{{- if (eq (.Params.comments | default true) true) -}}
		<div class="commenter">
			<script src="https://giscus.app/client.js"
				data-repo="GitHubUserName/RepoName"
				data-repo-id="ReplaceThisWithYourRepoId"
				data-category="Announcements"
				data-category-id="DIC_kwDOONd4H84CpGLA"
				data-mapping="pathname"
				data-strict="1"
				data-reactions-enabled="1"
				data-emit-metadata="0"
				data-input-position="bottom"
				data-theme="preferred_color_scheme"
				data-theme-light="{{ .Site.Params.commentsLight | default `light` }}" 
				data-theme-dark="{{ .Site.Params.commentsDark | default `dark` }}"
				data-lang="en"
				data-loading="lazy"
				crossorigin="anonymous"
				async>
			</script>
		</div>
	{{- end -}}
{{- end -}}
