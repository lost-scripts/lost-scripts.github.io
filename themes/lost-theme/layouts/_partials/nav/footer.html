<span>
	<span class="copyright long">{{ site.Copyright | safeHTML }}</span>
	<span class="copyright short">{{ site.Params.copyrightAlt | safeHTML }}</span>
</span>

{{- if.Site.Params.hugo -}}

	</a>
{{- end -}}
