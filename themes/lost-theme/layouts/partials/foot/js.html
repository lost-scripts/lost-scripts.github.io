{{- with resources.Get "js/main.js" -}}
	{{- if eq hugo.Environment "development" -}}
		{{- with . | js.Build -}}
			<script src="{{ .RelPermalink }}" data-context="body"></script>
		{{- end -}}
	{{- else -}}
		{{- $opts := dict "minify" true -}}
		{{- with . | js.Build $opts | fingerprint -}}
			<script src="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}" crossorigin="anonymous" data-context="body"></script>
		{{- end -}}
	{{- end -}}
{{- end -}}
