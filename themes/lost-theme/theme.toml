# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = 'Lost (Hugo) Theme'
license = 'MIT'
licenselink = 'https://github.com/lost-scripts/lost-theme/blob/master/LICENSE'
description = 'A not only documentation but also item focused Hugo theme'
min_version = "0.146.0"

# The home page of the theme, where the source can be found
homepage = 'https://github.com/lost-scripts/lost-theme'

# If you have a running demo of the theme
demosite = 'https://lost-scripts.github.io/'

# Taxonomy terms
tags = ['items', 'scripts', 'documentation', 'light', 'dark']
features = ['responsive', 'dual-navigator', 'filters', 'theme-toggle', 'highlights-color', 'fontawesome', 'searchbox', 'comments', 'breadcrumbs', 'link-dock', 'widgets']

# If the theme has a single author
[author]
  name = 'Rai López'
  homepage = 'https://lost-scripts.github.io'

# If the theme has multiple authors
#authors = [
#  {name = 'Name of author', homepage = 'Website of author'},
#  {name = 'Name of author', homepage = 'Website of author'}
#]

# If porting an existing theme
#[original]
#  author = 'Name of original author'
#  homepage = 'Website of original author'
#  repo = 'https://github.com/owner/repo'
